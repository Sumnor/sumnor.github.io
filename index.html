<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent 🔬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/10 text-indigo-400 mb-4 border border-indigo-500/20 shadow-xl">
                <span class="text-3xl">🔬</span>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                Pure Client-Side Research Agent
            </h1>
            <p class="text-slate-400 mt-2 text-sm max-w-md mx-auto">
                No Backend server. Uses real-time DuckDuckGo scraping proxies. Data disappears on reload.
            </p>
        </header>

        <main class="space-y-6">
            <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
                <div class="space-y-5">
                    <div>
                        <label for="promptInput" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">
                            Topic Input & Focus Matrix Directives
                        </label>
                        <textarea id="promptInput" rows="5" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-sm font-mono"
                            placeholder="quantum computing&#10;* focus on 2024 breakthroughs&#10;* title, intro, qubits, breakthroughs, conclusion"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">
                            Select Format Mode
                        </label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <label class="relative flex flex-col p-4 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer hover:border-slate-700 transition group">
                                <input type="radio" name="mode" value="1" checked class="sr-only peer">
                                <span class="absolute top-4 right-4 w-4 h-4 border border-slate-700 rounded-full flex items-center justify-center peer-checked:border-indigo-500 peer-checked:bg-indigo-500 after:content-[''] after:w-1.5 after:h-1.5 after:bg-white after:rounded-full after:opacity-0 peer-checked:after:opacity-100 transition"></span>
                                <div class="text-2xl mb-1 group-hover:scale-110 transition duration-300 self-start">📄</div>
                                <span class="font-bold text-sm text-slate-200">Detailed Paper</span>
                                <span class="text-xs text-slate-500 mt-1">10 sources, deep paragraphs saved to PDF.</span>
                            </label>

                            <label class="relative flex flex-col p-4 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer hover:border-slate-700 transition group">
                                <input type="radio" name="mode" value="2" class="sr-only peer">
                                <span class="absolute top-4 right-4 w-4 h-4 border border-slate-700 rounded-full flex items-center justify-center peer-checked:border-indigo-500 peer-checked:bg-indigo-500 after:content-[''] after:w-1.5 after:h-1.5 after:bg-white after:rounded-full after:opacity-0 peer-checked:after:opacity-100 transition"></span>
                                <div class="text-2xl mb-1 group-hover:scale-110 transition duration-300 self-start">⚡</div>
                                <span class="font-bold text-sm text-slate-200">Breakdown</span>
                                <span class="text-xs text-slate-500 mt-1">6 sources, bullet points summarized to PDF.</span>
                            </label>

                            <label class="relative flex flex-col p-4 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer hover:border-slate-700 transition group">
                                <input type="radio" name="mode" value="3" class="sr-only peer">
                                <span class="absolute top-4 right-4 w-4 h-4 border border-slate-700 rounded-full flex items-center justify-center peer-checked:border-indigo-500 peer-checked:bg-indigo-500 after:content-[''] after:w-1.5 after:h-1.5 after:bg-white after:rounded-full after:opacity-0 peer-checked:after:opacity-100 transition"></span>
                                <div class="text-2xl mb-1 group-hover:scale-110 transition duration-300 self-start">📊</div>
                                <span class="font-bold text-sm text-slate-200">Presentation</span>
                                <span class="text-xs text-slate-500 mt-1">Slide deck compilation exported as editable PPTX.</span>
                            </label>
                        </div>
                    </div>

                    <button id="runBtn" onclick="runClientAgent()"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-600/10 text-sm tracking-wide">
                        🚀 Start Live Proxy Scrape Agent
                    </button>
                </div>
            </section>

            <section id="logPanel" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-5 font-mono text-xs text-indigo-300 space-y-2 max-h-56 overflow-y-auto shadow-inner">
                <div class="text-slate-500 border-b border-slate-800 pb-1 mb-2 font-sans font-bold uppercase tracking-wider">Console Process Logs</div>
                <div id="logContent" class="space-y-1"></div>
            </section>

            <section id="resultsPanel" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-4">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-800 pb-4">
                    <div>
                        <h2 class="text-lg font-bold text-slate-100">✨ Research Compilation Complete</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Instance runtime preview buffer</p>
                    </div>
                    <button id="downloadBtn" 
                        class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-5 rounded-xl transition text-xs shadow-lg flex items-center space-x-1">
                        <span>📥 Download Compiled File</span>
                    </button>
                </div>
                <div id="previewContainer" class="bg-slate-950 border border-slate-800 rounded-xl p-4 max-h-96 overflow-y-auto text-sm text-slate-300 space-y-4 font-mono text-xs"></div>
            </section>
        </main>
    </div>

    <script>
        // Runtime in-memory storage variable (cleans completely when reloading page)
        let runtimeSessionData = null;

        // Configuration mapping matching Python variable structures
        const CONFIG_MODES = {
            "1": { label: "Detailed Research Paper", num_results: 8, max_chars: 6000, min_words: 20, sim_thresh: 0.80, max_paras: null },
            "2": { label: "Breakdown",               num_results: 6, max_chars: 3000, min_words: 15, sim_thresh: 0.70, max_paras: 6 },
            "3": { label: "Presentation (.pptx)",    num_results: 7, max_chars: 3000, min_words: 15, sim_thresh: 0.75, max_paras: 5 }
        };

        // Open CORS proxies to bypass Cross-Origin restrictions directly inside browser thread
        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        function consoleLog(msg) {
            const panel = document.getElementById('logPanel');
            const content = document.getElementById('logContent');
            panel.classList.remove('hidden');
            const item = document.createElement('div');
            item.className = "py-0.5 border-l-2 border-indigo-500/40 pl-2 text-slate-300";
            item.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            content.appendChild(item);
            panel.scrollTop = panel.scrollHeight;
        }

        // 1. INPUT CONTEXT PARSING (Identical logic to Python parse_input)
        function parseInputBuffer(raw) {
            const lines = raw.split('\n');
            let topicLines = [];
            let contextLines = [];
            lines.forEach(line => {
                let s = line.trim();
                if (s.startsWith('*')) {
                    contextLines.push(s.replace(/^\*+/, '').trim());
                } else if (s.length > 0) {
                    topicLines.push(s);
                }
            });
            return {
                topic: topicLines.join(' ').trim(),
                contextLines: contextLines
            };
        }

        function parseSlideOutline(contextLines) {
            let slides = [];
            contextLines.forEach(line => {
                if (/(\d+)\s+slides?/i.test(line)) return; // skip explicit slide count strings
                let parts = line.split(',').map(p => p.trim()).filter(p => p.length > 0);
                slides.push(...parts);
            });
            return slides;
        }

        // Text similarity matching replacement engine for difflib.SequenceMatcher
        function checkSimilarity(str1, str2) {
            const w1 = new Set(str1.toLowerCase().match(/\w+/g) || []);
            const w2 = new Set(str2.toLowerCase().match(/\w+/g) || []);
            if (w1.size === 0 || w2.size === 0) return 0;
            const intersection = new Set([...w1].filter(x => w2.has(x)));
            return intersection.size / Math.max(w1.size, w2.size);
        }

        async function fetchWithProxyFallback(url) {
            let lastError = null;
            for (let proxyFn of PROXIES) {
                try {
                    const proxiedUrl = proxyFn(url);
                    let resp = await fetch(proxiedUrl, { headers: { "User-Agent": "Mozilla/5.0" } });
                    if (resp.ok) return await resp.text();
                } catch (e) {
                    lastError = e;
                }
            }
            throw lastError || new Error("All proxy scrapers were rejected.");
        }

        // MAIN FLOW RUNNER CONTROL TERMINAL
        async function runClientAgent() {
            const rawInput = document.getElementById('promptInput').value.trim();
            if (!rawInput) { return alert("Please enter your prompt criteria configuration first."); }

            const runBtn = document.getElementById('runBtn');
            const resultsPanel = document.getElementById('resultsPanel');
            document.getElementById('logContent').innerHTML = '';
            resultsPanel.classList.add('hidden');
            runtimeSessionData = null;

            runBtn.disabled = true;
            runBtn.innerText = "⏳ Processing Scraper Array Grid...";

            try {
                const { topic, contextLines } = parseInputBuffer(rawInput);
                const modeVal = document.querySelector('input[name="mode"]:checked').value;
                const modeCfg = CONFIG_MODES[modeVal];

                consoleLog(`[ 1/4 ] Query Extraction: <strong class="text-white">${topic}</strong>`);
                
                // Construct fallback slide structure if mode 3 is selected
                let slideTitles = [];
                if (modeVal === "3") {
                    slideTitles = parseSlideOutline(contextLines);
                    if (!slideTitles.length) slideTitles = ["Title Context", "Core Discoveries", "Deep Dive Data", "Strategic Outlook"];
                    consoleLog(`📊 Slides Mapped: ${slideTitles.join(' → ')}`);
                }

                // 2. SCRAPING DUCKDUCKGO VIA PROXY PIPELINE
                const searchQuery = topic + (contextLines.length ? " " + contextLines.join(" ") : "");
                consoleLog(`🔍 Triggering online DuckDuckGo proxy fetch query...`);
                
                // Scrape the HTML structure of DuckDuckGo Lite search interface to extract target links cleanly
                const ddgUrl = `https://lite.duckduckgo.com/lite/html?q=${encodeURIComponent(searchQuery)}`;
                const ddgHtml = await fetchWithProxyFallback(ddgUrl);
                
                // Parse strings into standard DOM objects to scrape elements (replacing BeautifulSoup)
                const parser = new DOMParser();
                const doc = parser.parseFromString(ddgHtml, 'text/html');
                const links = doc.querySelectorAll('a.result-link');
                
                let searchResults = [];
                links.forEach(link => {
                    let href = link.getAttribute('href');
                    let title = link.textContent.trim();
                    if (href && href.startsWith('http') && !href.includes('duckduckgo.com')) {
                        searchResults.push({ title: title, href: href });
                    }
                });

                searchResults = searchResults.slice(0, modeCfg.num_results);
                if (!searchResults.length) {
                    consoleLog(`❌ Scraping error: No links could be parsed from DuckDuckGo search return vector.`);
                    runBtn.disabled = false;
                    runBtn.innerText = "🚀 Start Live Proxy Scrape Agent";
                    return;
                }

                consoleLog(`✅ Captured ${searchResults.length} web page destination locations targets.`);

                // 3. PAGE SCRAPING & DOM EXTRACTION PIPELINE
                consoleLog(`[ 2/4 ] Fetching page components data contents...`);
                let rawSourcesPool = [];

                for (let res of searchResults) {
                    try {
                        consoleLog(`📡 Scrape downloading target: <span class="text-indigo-400">${res.title.substring(0,35)}...</span>`);
                        const pageHtml = await fetchWithProxyFallback(res.href);
                        const pageDoc = parser.parseFromString(pageHtml, 'text/html');
                        
                        // Clean junk templates tags completely out of scope matching Python file criteria
                        const junkTags = pageDoc.querySelectorAll('script, style, nav, footer, header, aside, form, noscript');
                        junkTags.forEach(t => t.remove());

                        let collectedParagraphs = [];
                        const textNodes = pageDoc.querySelectorAll('p, h2, h3, li');
                        
                        textNodes.forEach(node => {
                            let text = node.textContent.replace(/\s+/g, ' ').trim();
                            if (text.split(' ').length >= modeCfg.min_words) {
                                collectedParagraphs.push(text);
                            }
                        });

                        let totalCharCount = 0;
                        let limitedParas = [];
                        for (let p of collectedParagraphs) {
                            if (totalCharCount + p.length > modeCfg.max_chars) break;
                            limitedParas.push(p);
                            totalCharCount += p.length;
                        }

                        if (limitedParas.length > 0) {
                            rawSourcesPool.push({
                                title: res.title,
                                url: res.href,
                                paragraphs: limitedParas
                            });
                            consoleLog(`&nbsp;&nbsp;&nbsp;&nbsp;✅ Extracted → ${limitedParas.length} paragraphs successfully`);
                        } else {
                            consoleLog(`&nbsp;&nbsp;&nbsp;&nbsp;⛔ Empty skip: No significant text paragraph nodes.`);
                        }
                    } catch (e) {
                        consoleLog(`&nbsp;&nbsp;&nbsp;&nbsp;⛔ Connection Skip: Site blocked query request.`);
                    }
                }

                if (!rawSourcesPool.length) {
                    throw new Error("All extracted internet connection sources were rejected/blocked by CORS cross origin blocks.");
                }

                // 4. TEXT SEQUENCE SIMIDUP DEDUPLICATION
                consoleLog(`[ 3/4 ] Deduplicating overlapping article text streams...`);
                let deduplicatedSources = [];
                let trackingPool = [];
                let initialCount = 0;
                let postCount = 0;

                rawSourcesPool.forEach(src => {
                    initialCount += src.paragraphs.length;
                    let uniqueParas = [];
                    src.paragraphs.forEach(p => {
                        let isDuplicate = trackingPool.some(existingPara => checkSimilarity(p, existingPara) > modeCfg.sim_thresh);
                        if (!isDuplicate) {
                            uniqueParas.push(p);
                            trackingPool.push(p);
                        }
                    });

                    if (modeCfg.max_paras) {
                        uniqueParas = uniqueParas.slice(0, modeCfg.max_paras);
                    }

                    if (uniqueParas.length > 0) {
                        deduplicatedSources.push({
                            title: src.title,
                            url: src.url,
                            paragraphs: uniqueParas
                        });
                        postCount += uniqueParas.length;
                    }
                });

                consoleLog(`&nbsp;&nbsp;&nbsp;&nbsp;📉 Filtered processing total text nodes index buffer block from ${initialCount} down to ${postCount}.`);

                // Store state session inside runtime container variable memory mapping architecture
                runtimeSessionData = {
                    topic: topic,
                    contextLines: contextLines,
                    mode: modeVal,
                    modeCfg: modeCfg,
                    sources: deduplicatedSources,
                    slideTitles: slideTitles
                };

                // Output structural UI components rendering updates
                renderPreviewLayout(runtimeSessionData);

            } catch (err) {
                consoleLog(`💥 Engine Failure Exception: ${err.message}`);
                console.error(err);
            } finally {
                runBtn.disabled = false;
                runBtn.innerText = "🚀 Start Live Proxy Scrape Agent";
            }
        }

        function renderPreviewLayout(data) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';
            
            const metaHeader = document.createElement('div');
            metaHeader.className = "border-b border-slate-800 pb-2 mb-3 text-indigo-400 text-xs font-bold";
            metaHeader.innerHTML = `TARGET PROMPT TOPIC LOGIC INDEX: ${data.topic.toUpperCase()}<br>VERIFIED DATA SOURCES RECORD COUNT: ${data.sources.length}`;
            container.appendChild(metaHeader);

            data.sources.forEach((src, sIdx) => {
                const wrap = document.createElement('div');
                wrap.className = "bg-slate-900/60 border border-slate-800/80 rounded-lg p-3 space-y-1.5";
                
                let textItems = '';
                src.paragraphs.forEach(p => {
                    textItems += data.mode === "2" ? `<li class="list-disc ml-4 text-slate-300">${p}</li>` : `<p class="text-slate-300 leading-relaxed mb-1">${p}</p>`;
                });

                wrap.innerHTML = `
                    <div class="text-slate-200 font-bold text-xs">${sIdx+1}. ${src.title}</div>
                    <div class="text-[10px] text-slate-500 truncate underline mb-2">${src.url}</div>
                    <div class="space-y-1">${textItems}</div>
                `;
                container.appendChild(wrap);
            });

            document.getElementById('downloadBtn').onclick = () => {
                if (data.mode === "3") { buildPptxClientBinary(data); } else { buildPdfClientBinary(data); }
            };

            const panel = document.getElementById('resultsPanel');
            panel.classList.remove('hidden');
            panel.scrollIntoView({ behavior: 'smooth' });
        }

        // 5A. CLIENT-SIDE REPLACEMENT EXPORT ENGINE FOR REPORTLAB PDF GENERATION
        function buildPdfClientBinary(data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', format: 'a4' });
            
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 20;
            const contentWidth = pageWidth - (margin * 2);
            let y = 30;

            const checkPageBreak = (neededH) => {
                if (y + neededH > pageHeight - margin) { doc.addPage(); y = 20; return true; }
                return false;
            };

            // Cover Banner Section Layout styling
            doc.setFillColor(15, 23, 42);
            doc.roundedRect(margin, y, contentWidth, 42, 3, 3, 'F');
            doc.setTextColor(165, 180, 252); doc.setFont("helvetica", "normal"); doc.setFontSize(10);
            doc.text("AUTOMATED RESEARCH REPORT DIGEST", pageWidth / 2, y + 12, { align: "center" });
            
            doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(18);
            let wrapTitle = doc.splitTextToSize(data.topic.toUpperCase(), contentWidth - 15);
            doc.text(wrapTitle, pageWidth / 2, y + 24, { align: "center" });

            y += 60;
            doc.setTextColor(71, 85, 105); doc.setFont("helvetica", "normal"); doc.setFontSize(10);
            doc.text(`Format Profile: ${data.modeCfg.label}`, margin, y); y += 6;
            doc.text(`Database Source Records Parsed: ${data.sources.length} domains evaluated.`, margin, y); y += 15;

            if (data.contextLines.length > 0) {
                doc.setFont("helvetica", "bold"); doc.setTextColor(15, 23, 42);
                doc.text("Focus Matrix Constraints Parameters:", margin, y); y += 6;
                doc.setFont("helvetica", "normal"); doc.setTextColor(71, 85, 105);
                let wrapCtx = doc.splitTextToSize(data.contextLines.join('; '), contentWidth);
                doc.text(wrapCtx, margin, y); y += (wrapCtx.length * 5) + 10;
            }
            doc.text(`Generated on ${new Date().toLocaleDateString()} using Volatile Variable Runtime Workspace.`, margin, y);

            // Table of Contents Page Allocation
            doc.addPage(); y = 25;
            doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(15);
            doc.text("Inhaltsverzeichnis", margin, y); y += 4;
            doc.setDrawColor(99, 102, 241); doc.setLineWidth(0.5); doc.line(margin, y, pageWidth - margin, y); y += 10;

            data.sources.forEach((src, idx) => {
                checkPageBreak(15);
                doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(99, 102, 241);
                doc.text(`${idx + 1}.`, margin, y);
                doc.setTextColor(15, 23, 42);
                let truncTitle = src.title.length > 60 ? src.title.substring(0, 57) + "..." : src.title;
                doc.text(truncTitle, margin + 6, y);
                doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(100, 116, 139); y += 4.5;
                doc.text(src.url, margin + 6, y); y += 8;
            });

            // Context Content Processing Page iteration mapping loops
            data.sources.forEach((src, idx) => {
                doc.addPage(); y = 25;
                doc.setFont("helvetica", "bold"); doc.setFontSize(13); doc.setTextColor(99, 102, 241);
                let wrappedHeading = doc.splitTextToSize(`${idx + 1}. ${src.title}`, contentWidth);
                doc.text(wrappedHeading, margin, y); y += (wrappedHeading.length * 5.5);

                doc.setFillColor(15, 23, 42); doc.roundedRect(margin, y, contentWidth, 6, 1, 1, 'F');
                doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "normal"); doc.setFontSize(8);
                doc.text(`Origin Source Connection Mapping: ${src.url}`, margin + 3, y + 4); y += 12;

                doc.setTextColor(15, 23, 42); doc.setFontSize(10);
                src.paragraphs.forEach(p => {
                    let wrappedParaLines = doc.splitTextToSize(p, data.mode === "2" ? contentWidth - 10 : contentWidth);
                    let blockH = (wrappedParaLines.length * 5) + 8;
                    checkPageBreak(blockH);

                    if (data.mode === "2") {
                        doc.setFillColor(99, 102, 241); doc.circle(margin + 2, y + 1.5, 0.8, 'F');
                        doc.text(wrappedParaLines, margin + 7, y + 4);
                    } else {
                        doc.text(wrappedParaLines, margin, y + 4);
                    }
                    y += (wrappedParaLines.length * 5) + 5;
                });
            });

            const escapeTitle = data.topic.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_').substring(0, 35);
            doc.save(`research_report_${escapeTitle || 'output'}.pdf`);
        }

        // 5B. CLIENT-SIDE REPLACEMENT EXPORT ENGINE FOR PPTXGENJS PRESENTATION GENERATION
        function buildPptxClientBinary(data) {
            let pres = new PptxGenJS();
            pres.layout = "LAYOUT_16x9";

            let allParasUniverse = [];
            data.sources.forEach(s => {
                s.paragraphs.forEach(p => allParasUniverse.push({ text: p, origin: s.title }));
            });

            // Match strings via vector overlay arrays mapping keyword matching (identical algorithm architecture to Python script)
            function extractBestOverlapBullets(slideTitle, limitCount = 4) {
                let targets = new Set(slideTitle.toLowerCase().split(/\W+/).filter(w => w.length > 3));
                let ranked = [];

                allParasUniverse.forEach(node => {
                    let tokens = node.text.toLowerCase().split(/\W+/);
                    let intersections = tokens.filter(tok => targets.has(tok)).length;
                    ranked.push({ score: intersections, text: node.text });
                });

                ranked.sort((a,b) => b.score - a.score);
                let uniqueOut = [];
                for (let r of ranked) {
                    if (uniqueOut.length >= limitCount) break;
                    let sentence = r.text.split(/[.!?]\s+/)[0];
                    if (sentence.length > 170) sentence = sentence.substring(0, 167) + "...";
                    if (!uniqueOut.includes(sentence)) uniqueOut.push(sentence);
                }
                return uniqueOut.length ? uniqueOut : ["Database repository array connection tracking mapped standard baseline parameter matrix output values."];
            }

            // Slide 1: Cover Header slide initialization properties block mapping
            let sTitle = pres.addSlide();
            sTitle.background = { color: "0F172A" };
            sTitle.addText(data.topic.toUpperCase(), {
                x: 0.5, y: 2.1, w: 9.0, h: 1.4, fontSize: 32, bold: true, color: "FFFFFF", fontFace: "Arial", align: "center", valign: "middle"
            });
            sTitle.addText("Structured Research Intelligence Slide Presentation", {
                x: 0.5, y: 1.2, w: 9.0, h: 0.4, fontSize: 13, color: "A5B4FC", fontFace: "Arial", align: "center"
            });

            // Slide 2: Inhaltsverzeichnis slide components structures
            let sToc = pres.addSlide();
            sToc.background = { color: "F1F5F9" };
            sToc.addText("Inhaltsverzeichnis / Structural Mapping Agenda", { x: 0.5, y: 0.4, w: 9.0, h: 0.6, fontSize: 24, bold: true, color: "0F172A", fontFace: "Arial" });
            
            let bulletMapObjects = data.slideTitles.map((t, idx) => {
                return { text: `${idx + 1}. ${t}`, options: { bullet: true, fontSize: 14, color: "1E293B", breakLine: true } };
            });
            sToc.addText(bulletMapObjects, { x: 0.6, y: 1.3, w: 8.8, h: 3.8, fontFace: "Arial" });

            // Slide 3+: Dynamic Category Elements creation execution block
            data.slideTitles.forEach((title, idx) => {
                let sContent = pres.addSlide();
                sContent.background = { color: idx % 2 === 0 ? "FFFFFF" : "F8FAFC" };

                // Build a header layout block
                sContent.addText(title, {
                    x: 0.5, y: 0.2, w: 9.0, h: 0.6, fontSize: 22, bold: true, color: "0F172A", fontFace: "Arial", valign: "middle"
                });

                let customBullets = extractBestOverlapBullets(title, 4);
                let formattedTextBullets = customBullets.map(b => {
                    return { text: b, options: { bullet: true, fontSize: 14, color: "334155", breakLine: true } };
                });
                sContent.addText(formattedTextBullets, { x: 0.5, y: 1.2, w: 9.0, h: 4.0, fontFace: "Arial" });
            });

            // Final closing wrap layout sequence
            let sEnd = pres.addSlide();
            sEnd.background = { color: "0F172A" };
            sEnd.addText("Compilation Process Concluded.", { x: 0.5, y: 2.2, w: 9.0, h: 0.8, fontSize: 32, bold: true, color: "FFFFFF", fontFace: "Arial", align: "center" });

            const escapeTitle = data.topic.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_').substring(0, 35);
            pres.writeFile({ fileName: `research_deck_${escapeTitle || 'deck'}.pptx` });
        }
    </script>
</body>
</html>
