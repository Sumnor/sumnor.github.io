<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent — Results</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 860px; margin: 0 auto; }
    header {
      text-align: center;
      padding: 2.5rem 0 2rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    header p {
      margin-top: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .stats {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1.5rem 0 2rem;
    }
    .stat {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .stat strong { color: #a5b4fc; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      font-weight: 600;
    }
    tbody tr {
      border-bottom: 1px solid #1e293b;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263347; }
    td {
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      vertical-align: middle;
    }
    .icon { font-size: 1.2rem; }
    .topic {
      color: #e2e8f0;
      font-weight: 500;
      text-transform: capitalize;
      max-width: 280px;
    }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .date, .size { color: #64748b; font-size: 0.82rem; white-space: nowrap; }
    .dl {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .dl:hover { background: #4f46e5; }
    footer {
      text-align: center;
      margin-top: 2rem;
      color: #475569;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔬 Research Agent</h1>
      <p>Auto-generated research reports. Trigger a new run from the GitHub Actions tab.</p>
    </header>
    <div class="stats">
      <div class="stat"><strong>0</strong> reports</div>
      <div class="stat">Updated <strong>Jun 08, 2026 at 16:40 UTC</strong></div>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Topic</th>
            <th>Type</th>
            <th>Date</th>
            <th>Size</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:2rem">No results yet. Trigger a run from the Actions tab.</td></tr>
        </tbody>
      </table>
    </div>
    <footer>
      Research Agent · Powered by DuckDuckGo + Python · No AI
    </footer>
  </div>
</body>
</html>
